<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Finance Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
  /* ──────────────────────────────────────
     Config (fixed — HP controlled via postMessage)
  ────────────────────────────────────── */
  const config = {
    springRebound: 0.15,
    gravity: 0.25,
  };

  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  // Virtual resolution — 800/2 × 460/2 = 200% zoom
  const V_WIDTH  = 400;
  const V_HEIGHT = 230;

  /* ── State ── */
  const state = {
    hp: 100,
    duck: {
      x: 200,
      y: 165,
      targetX: 200,
      vx: 0,
      vy: 0,
      w: 60,
      h: 75,
      scaleX: 1,
      scaleY: 1,
      isKO: false,
      ghostY: 0,
      noseBubbleSize: 0,
    },
    particles: [],
    frame: 0,
  };

  /* ── postMessage — HP driven by financial data from parent ── */
  window.addEventListener('message', e => {
    if (!e.data || e.data.type !== 'setHp') return;
    const n    = Math.max(0, Math.min(100, +e.data.hp || 0));
    const prev = state.hp;
    state.hp   = n;

    if (n < prev - 3) {
      // HP dropped → hit visual feedback
      state.duck.scaleX = 1.35;
      state.duck.scaleY = 0.65;
      state.duck.vx = (Math.random() - 0.5) * 14;
      state.duck.vy = -3 - Math.random() * 5;
      spawnHitParticles('#fde047', 10);
    } else if (n > prev + 3) {
      // HP rose → heal visual feedback
      spawnHealParticles();
    }

    if (n <= 0 && !state.duck.isKO) {
      state.duck.isKO  = true;
      state.duck.ghostY = 0;
      spawnKOStars();
    } else if (n > 0 && state.duck.isKO) {
      state.duck.isKO = false;
    }
  });

  /* ── Canvas click — fun tap (no HP change) ── */
  canvas.addEventListener('click', e => {
    if (state.duck.isKO) return;
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) / rect.width  * V_WIDTH;
    const my   = (e.clientY - rect.top)  / rect.height * V_HEIGHT;
    const dx   = mx - state.duck.x;
    const dy   = my - (state.duck.y - state.duck.h / 2);
    if (Math.sqrt(dx * dx + dy * dy) < 70) {
      state.duck.scaleX = 1.3;
      state.duck.scaleY = 0.7;
      state.duck.vx = (Math.random() - 0.5) * 12;
      state.duck.vy = -2 - Math.random() * 4;
      spawnHitParticles('#fda4af', 8);
      pushText('โอ๊ย!', state.duck.x, state.duck.y - state.duck.h - 10, '#e11d48');
    }
  });

  /* ── Particle helpers ── */
  function spawnHitParticles(color, count) {
    for (let i = 0; i < count; i++) {
      state.particles.push({
        type: 'spark',
        x: state.duck.x + (Math.random() - 0.5) * 20,
        y: state.duck.y - state.duck.h / 2 + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 12,
        vy: -2 - Math.random() * 7,
        radius: 3 + Math.random() * 5,
        color,
        alpha: 1.0,
        life: 22 + Math.random() * 12,
      });
    }
  }

  function spawnHealParticles() {
    for (let i = 0; i < 8; i++) {
      state.particles.push({
        type: 'spark',
        x: state.duck.x + (Math.random() - 0.5) * 40,
        y: state.duck.y - state.duck.h / 2,
        vx: (Math.random() - 0.5) * 3,
        vy: -1 - Math.random() * 4,
        radius: 3 + Math.random() * 4,
        color: '#10b981',
        alpha: 1.0,
        life: 35,
      });
    }
    pushText('💚', state.duck.x, state.duck.y - state.duck.h - 15, '#10b981');
  }

  function spawnKOStars() {
    for (let j = 0; j < 20; j++) {
      const a = (j / 20) * Math.PI * 2;
      state.particles.push({
        type: 'spark',
        x: state.duck.x,
        y: state.duck.y - state.duck.h / 2,
        vx: Math.cos(a) * 5,
        vy: Math.sin(a) * 5,
        radius: 4,
        color: '#fbbf24',
        alpha: 1.0,
        life: 45,
      });
    }
  }

  function pushText(text, x, y, color) {
    state.particles.push({
      type: 'text', text, x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: -3.5,
      color,
      alpha: 1.0,
      life: 32,
    });
  }

  /* ── Auto particles (tears when hurt, KO orbit stars) ── */
  function spawnParticles() {
    if (state.hp < 50 && !state.duck.isKO) {
      const chance = state.hp < 20 ? 0.15 : 0.05;
      if (Math.random() < chance) {
        state.particles.push({
          type: 'tear',
          x: state.duck.x + (Math.random() < 0.5 ? -10 : 10),
          y: state.duck.y - state.duck.h * 0.72,
          vx: (Math.random() - 0.5) * 2,
          vy: 2, g: 0.15,
          radius: 2 + Math.random() * 2,
          color: '#60a5fa',
          alpha: 1.0, life: 30,
        });
      }
    }
    if (state.duck.isKO && state.frame % 12 === 0) {
      const a = state.frame * 0.1;
      state.particles.push({
        type: 'spark',
        x: state.duck.x + Math.sin(a) * 35,
        y: state.duck.y - state.duck.h - 10 + Math.cos(a) * 8,
        vx: 0, vy: -0.5,
        radius: 3.5, color: '#fbbf24',
        alpha: 1.0, life: 40,
      });
    }
  }

  /* ── Background ── */
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, V_HEIGHT);
    g.addColorStop(0, '#fef3c7');
    g.addColorStop(1, '#ffedd5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);

    ctx.fillStyle = 'rgba(251,113,133,0.04)';
    for (let x = 0; x < V_WIDTH; x += 30) ctx.fillRect(x, 0, 2, V_HEIGHT);
    for (let y = 0; y < V_HEIGHT; y += 30) ctx.fillRect(0, y, V_WIDTH, 2);

    ctx.strokeStyle = '#fda4af';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0,  60); ctx.lineTo(V_WIDTH,  60);
    ctx.moveTo(0,  74); ctx.lineTo(V_WIDTH,  74);
    ctx.stroke();

    ctx.fillStyle = '#fbcfe8';
    ctx.beginPath();
    ctx.ellipse(200, 184, 140, 23, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 3;
    ctx.stroke();
  }

  /* ── Particles draw ── */
  function drawAndUpdateParticles() {
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      if (p.type === 'spark') {
        p.x += p.vx; p.y += p.vy; p.vy += config.gravity; p.alpha -= 0.025;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
      } else if (p.type === 'tear') {
        p.x += p.vx; p.y += p.vy; p.vy += p.g; p.alpha -= 0.03;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
        ctx.beginPath(); ctx.ellipse(p.x, p.y, p.radius, p.radius * 1.5, 0, 0, Math.PI * 2); ctx.fill();
      } else if (p.type === 'text') {
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
        ctx.font = 'bold 13px "Fredoka", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      }
      ctx.globalAlpha = 1.0;
      p.life--;
      if (p.life <= 0 || p.alpha <= 0) state.particles.splice(i, 1);
    }
  }

  /* ── Duck character ── */
  function drawCharacter() {
    const d = state.duck;

    // KO Ghost ascending
    if (d.isKO) {
      d.ghostY -= 0.5;
      if (d.ghostY < -150) d.ghostY = -30;
      ctx.save();
      ctx.translate(d.x, d.y - 45 + d.ghostY);
      ctx.translate(Math.sin(state.frame * 0.08) * 8, 0);
      ctx.globalAlpha = 0.5 + Math.sin(state.frame * 0.1) * 0.15;
      ctx.fillStyle = '#fef08a'; ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(0, -10, 15, Math.PI, 0, false);
      ctx.lineTo(15, 12);
      ctx.quadraticCurveTo( 8, 10 + Math.sin(state.frame * 0.25) * 3, 0, 12);
      ctx.quadraticCurveTo(-8, 10 - Math.sin(state.frame * 0.25) * 3, -15, 12);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#854d0e';
      ctx.beginPath(); ctx.arc(-5,-8,2,0,Math.PI*2); ctx.arc(5,-8,2,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    // Spring squash/stretch
    d.scaleX += (1 - d.scaleX) * config.springRebound;
    d.scaleY += (1 - d.scaleY) * config.springRebound;

    ctx.save();
    ctx.translate(d.x, d.y);
    if (!d.isKO) ctx.rotate(d.vx * 0.025);
    else         ctx.rotate(-Math.PI / 2);
    ctx.scale(d.scaleX, d.scaleY);

    const w = d.w, h = d.h;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.ellipse(0, 0, w/2+5, 8, 0, 0, Math.PI*2); ctx.fill();

    // Legs
    ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-10,-5); ctx.lineTo(-10,0);
    ctx.moveTo( 10,-5); ctx.lineTo( 10,0);
    ctx.stroke();

    // Feet
    ctx.fillStyle = '#ea580c';
    ctx.beginPath(); ctx.arc(-13,1,6,0,Math.PI*2); ctx.arc(13,1,6,0,Math.PI*2); ctx.fill();

    // Torso
    ctx.fillStyle = '#facc15'; ctx.strokeStyle = '#334155'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.roundRect(-w/2,-h+10,w,h-10,16); ctx.fill(); ctx.stroke();

    // Coat seam
    ctx.strokeStyle = '#ca8a04'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0,-h+15); ctx.lineTo(0,-8); ctx.stroke();

    // Buttons
    ctx.fillStyle = '#ea580c';
    ctx.beginPath(); ctx.arc(0,-h+23,3.5,0,Math.PI*2); ctx.arc(0,-h+38,3.5,0,Math.PI*2); ctx.fill();

    // Wings
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 7;
    ctx.beginPath();
    if (d.isKO) {
      ctx.moveTo(-w/2,-h*0.5); ctx.lineTo(-w/2-8,-h*0.2);
      ctx.moveTo( w/2,-h*0.5); ctx.lineTo( w/2+8,-h*0.2);
    } else if (state.hp < 20) {
      ctx.moveTo(-w/2,-h*0.4); ctx.lineTo(-w/2+10,-h*0.78);
      ctx.moveTo( w/2,-h*0.4); ctx.lineTo( w/2-10,-h*0.78);
    } else if (state.hp < 50) {
      ctx.moveTo(-w/2,-h*0.4); ctx.lineTo(-5,-h*0.6);
      ctx.moveTo( w/2,-h*0.4); ctx.lineTo( 5,-h*0.6);
    } else {
      ctx.moveTo(-w/2,-h*0.4); ctx.lineTo(-w/2-12,-h*0.3);
      ctx.moveTo( w/2,-h*0.4); ctx.lineTo( w/2+12,-h*0.3);
    }
    ctx.stroke();

    // ── Head ──
    ctx.save();
    ctx.translate(0, -h+4);

    // Hood
    ctx.fillStyle = '#facc15'; ctx.strokeStyle = '#334155'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // Ear flaps
    const earSwing = Math.sin(state.frame * 0.12) * 2;
    ctx.fillStyle = '#facc15';
    ctx.beginPath();
    ctx.ellipse(-23,-5+earSwing,6,11, Math.PI/6,0,Math.PI*2);
    ctx.ellipse( 23,-5-earSwing,6,11,-Math.PI/6,0,Math.PI*2);
    ctx.fill(); ctx.stroke();

    // Bill on hood
    ctx.fillStyle = '#f97316';
    ctx.beginPath(); ctx.ellipse(0,-25,9,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // Inner face
    ctx.fillStyle = '#ffe4e6';
    ctx.beginPath(); ctx.arc(0,3,19,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ca8a04'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0,3,19,0,Math.PI*2); ctx.stroke();

    // Blush
    ctx.fillStyle = 'rgba(251,113,133,0.45)';
    ctx.beginPath(); ctx.ellipse(-10,7,5,3,0,0,Math.PI*2); ctx.ellipse(10,7,5,3,0,0,Math.PI*2); ctx.fill();

    // ── Wounds by HP level ──
    if (state.hp < 80) {
      ctx.fillStyle = '#fed7aa'; ctx.strokeStyle = '#f97316'; ctx.lineWidth = 1;
      ctx.save(); ctx.translate(-11,4); ctx.rotate(Math.PI/4);
      ctx.fillRect(-6,-2,12,4); ctx.strokeRect(-6,-2,12,4);
      ctx.rotate(Math.PI/2); ctx.fillRect(-6,-2,12,4); ctx.strokeRect(-6,-2,12,4);
      ctx.restore();
      ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(11,-12); ctx.lineTo(5,-7); ctx.stroke();
    }
    if (state.hp < 50) {
      ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(-21,-11,42,6,2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#f43f5e';
      ctx.beginPath(); ctx.arc(8,-8,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(56,189,248,0.35)';
      ctx.beginPath(); ctx.arc(10,2,6,0,Math.PI*2); ctx.fill();
    }
    if (state.hp < 20) {
      ctx.fillStyle = '#fed7aa'; ctx.strokeStyle = '#f97316'; ctx.lineWidth = 1;
      ctx.fillRect(5,7,10,4); ctx.strokeRect(5,7,10,4);
      ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-1,1); ctx.lineTo(2,4); ctx.stroke();
    }

    // ── Face expression ──
    if (d.isKO) {
      ctx.strokeStyle = '#475569'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-11,-1); ctx.lineTo(-5,5); ctx.moveTo(-5,-1); ctx.lineTo(-11,5);
      ctx.moveTo(  5,-1); ctx.lineTo(11,5); ctx.moveTo(11,-1); ctx.lineTo(  5,5);
      ctx.stroke();
      ctx.beginPath(); ctx.arc(0,11,2.5,0,Math.PI*2); ctx.stroke();
    } else if (state.hp < 20) {
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let a = 0; a < Math.PI*4; a += 0.1) { const r=0.8+a*0.9; ctx.lineTo(-8+Math.cos(a)*r, 2+Math.sin(a)*r); }
      ctx.stroke();
      ctx.beginPath();
      for (let a = 0; a < Math.PI*4; a += 0.1) { const r=0.8+a*0.9; ctx.lineTo( 8+Math.cos(a)*r, 2+Math.sin(a)*r); }
      ctx.stroke();
      ctx.fillStyle = '#fda4af'; ctx.beginPath(); ctx.arc(0,10,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
      d.noseBubbleSize = 2 + Math.sin(state.frame*0.15)*2;
      ctx.fillStyle = 'rgba(56,189,248,0.5)'; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(-2,7,d.noseBubbleSize,0,Math.PI*2); ctx.fill(); ctx.stroke();
    } else if (state.hp < 50) {
      ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(-8,2,4,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(5,2); ctx.lineTo(11,2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-4,9); ctx.quadraticCurveTo(-2,6,0,9); ctx.quadraticCurveTo(2,12,4,9); ctx.stroke();
    } else if (state.hp < 80) {
      ctx.fillStyle = '#1e293b';
      ctx.beginPath(); ctx.arc(-8,3,3,0,Math.PI*2); ctx.arc(8,3,3,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-3,9); ctx.lineTo(3,9); ctx.stroke();
    } else {
      ctx.fillStyle = '#1e293b';
      ctx.beginPath(); ctx.arc(-8,2,4,0,Math.PI*2); ctx.arc(8,2,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(-9,1,1.5,0,Math.PI*2); ctx.arc(-7,3,.7,0,Math.PI*2); ctx.arc(7,1,1.5,0,Math.PI*2); ctx.arc(9,3,.7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(-2,7,2,0,Math.PI,false); ctx.arc(2,7,2,0,Math.PI,false); ctx.stroke();
    }

    ctx.restore(); // head
    ctx.restore(); // body
  }

  /* ── HP bar under duck ── */
  function drawHPBar() {
    const hpx = state.duck.x - 50;
    const hpy = state.duck.y + 15;
    ctx.fillStyle = '#e2e8f0'; ctx.strokeStyle = '#475569'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(hpx, hpy, 100, 10, 4); ctx.fill(); ctx.stroke();
    let hpColor = '#10b981';
    if (state.hp < 25) hpColor = '#ef4444';
    else if (state.hp < 60) hpColor = '#f59e0b';
    ctx.fillStyle = hpColor;
    ctx.beginPath(); ctx.roundRect(hpx+1, hpy+1, Math.max(0,state.hp-2), 8, 3); ctx.fill();
    ctx.fillStyle = '#475569'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`HP: ${Math.round(state.hp)}/100`, state.duck.x, hpy-4);
  }

  /* ── Status label ── */
  function drawStatusLabel() {
    let text, color, bg;
    if (state.duck.isKO) {
      text='💀 งบหมดแล้ว! ต้องหารายได้เพิ่ม!'; color='#fff'; bg='#1e293b';
    } else if (state.hp < 20) {
      text='😭 วิกฤตการเงิน! รายจ่ายสูงมาก!'; color='#fff'; bg='#ef4444';
    } else if (state.hp < 50) {
      text='😰 รายจ่ายสูง.. ระวังด้วยนะ'; color='#fff'; bg='#f97316';
    } else if (state.hp < 80) {
      text='🤕 พอใช้ได้ แต่ต้องระวังรายจ่าย'; color='#1e293b'; bg='#fbbf24';
    } else {
      text='🐤 การเงินแข็งแรงดีมาก!'; color='#fff'; bg='#10b981';
    }
    ctx.font = 'bold 11px "Fredoka", sans-serif';
    const tw = ctx.measureText(text).width;
    const bw = tw + 20, bh = 21;
    const bx = (V_WIDTH - bw) / 2, by = 10;
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
    ctx.fillStyle = color; ctx.textAlign = 'center';
    ctx.fillText(text, V_WIDTH/2, by+bh-6);
  }

  /* ── Physics update ── */
  function updateState() {
    state.frame++;
    const d = state.duck;
    if (d.isKO) {
      d.vx = 0; d.vy = 0; d.y = 167;
    } else {
      d.vx *= 0.88;
      d.x  += d.vx;
      d.x   = Math.max(75, Math.min(V_WIDTH-75, d.x));
      d.x  += (d.targetX - d.x) * 0.12;
    }
    spawnParticles();
  }

  /* ── Canvas resize ── */
  function resizeCanvas() {
    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
      canvas.width  = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }
  }

  /* ── Main loop ── */
  function gameLoop() {
    resizeCanvas();
    updateState();
    ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);
    ctx.save();
    ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);
    drawBackground();
    drawAndUpdateParticles();
    drawCharacter();
    drawHPBar();
    drawStatusLabel();
    ctx.restore();
    requestAnimationFrame(gameLoop);
  }

  gameLoop();
</script>
</body>
</html>
